```xml
<!-- ============================= -->
<!-- 🔴  SECURITY LOG QUERY (REPLACE FULL BLOCK) -->
<!-- ============================= -->
<localfile>
  <location>Security</location>
  <log_format>eventchannel</log_format>
  <query>
    Event/System[
      (EventID=4625 or EventID=4720 or EventID=4732 or EventID=4688)
    ]
  </query>
</localfile>


<!-- ============================= -->
<!-- 🔴 SYSMON LOG FIX -->
<!-- ============================= -->
<localfile>
  <location>Microsoft-Windows-Sysmon/Operational</location>
  <log_format>eventchannel</log_format>
  <only-future-events>yes</only-future-events>
</localfile>


<!-- ============================= -->
<!-- 🔴 DOWNLOAD PATH FIX -->
<!-- ============================= -->
<directories check_all="yes" realtime="yes" report_changes="yes"
  md5="yes" sha1="yes" sha256="yes">
  C:\Users\*\Downloads   <!-- 🔴 CHANGE if needed -->
</directories>


<!-- ============================= -->
<!-- 🔴 PERFORMANCE TUNING -->
<!-- ============================= -->
<client_buffer>
  <disabled>no</disabled>
  <queue_size>10000</queue_size>
  <events_per_second>1000</events_per_second>
</client_buffer>

<syscheck>
  <max_eps>500</max_eps>
</syscheck>
```
